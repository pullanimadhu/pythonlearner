      - text: "✅ Based on the provided context, there are several ways to iterate over a cx_Oracle result set, each with its own trade-offs [Source 1]: 1. **Use the built-in cursor iterator (Canonical Way):** This is the standard and recommended way to iterate through a result set. ```python curs.execute('select * from people') for row in curs: print(row) ``` 2. **Use `fetchall()`:** This method retrieves all the rows from the result set at once. It can be convenient for smaller result sets or when you want to build a list directly. However, for large result sets, it can cause high memory usage on the client, delay processing until all rows are fetched, and incur performance overhead from constructing and destructing the list [Source 1]. ```python for row in curs.fetchall(): print(row) ``` 3. **Use `fetchone()`:** If you know only a single row is being returned, you can use `fetchone()` to grab just that row [Source 1]. ```python curs.execute('select max(x) from t') maxValue = curs.fetchone()[0] ``` Alternatively, you can use a `while` loop with `fetchone()` to fetch one row at a time, although there is generally no advantage to doing this over the standard cursor iterator [Source 1]. ```python row = curs.fetchone() while row: print(row) row = curs.fetchone() ```"
